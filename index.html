<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variados aos Estudos | Admin via Realtime DB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eefa 100%);
            min-height: 100vh;
            color: #1e2a3e;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b3b4e, #1a4d8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo span {
            font-size: 0.8rem;
            color: #666;
        }
        
        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary { background: #2c5f8a; color: white; }
        .btn-primary:hover { background: #1e4668; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #2c5f8a; color: #2c5f8a; }
        .btn-danger { background: #b13e3e; color: white; }
        .badge-user { background: #e2e8f0; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.85rem; }
        
        .questions-panel {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-left: 5px solid #2c5f8a;
            padding-left: 1rem;
        }
        
        .question-card {
            background: #f9fafc;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #e2edf7;
            transition: transform 0.2s;
        }
        
        .question-card:hover { transform: translateX(5px); }
        
        .question-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin: 10px 0;
            object-fit: cover;
            cursor: pointer;
        }
        
        .question-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .answer-area { margin-top: 0.8rem; display: flex; gap: 0.7rem; flex-wrap: wrap; }
        .answer-input { flex: 1; padding: 0.6rem 1rem; border-radius: 60px; border: 1px solid #cbd5e1; }
        .check-btn { background: #2c5f8a; color: white; border: none; border-radius: 40px; padding: 0.5rem 1rem; cursor: pointer; }
        .feedback { margin-top: 0.4rem; font-size: 0.85rem; font-weight: 500; }
        
        .admin-panel {
            display: none;
            background: #ffffffdd;
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(44,95,138,0.3);
        }
        
        .admin-panel.visible { display: block; }
        
        .form-group { margin-bottom: 1.2rem; }
        label { font-weight: 600; display: block; margin-bottom: 0.4rem; }
        input, textarea { width: 100%; padding: 0.8rem; border-radius: 20px; border: 1px solid #cbd5e1; font-family: inherit; }
        
        .image-preview {
            max-width: 200px;
            max-height: 150px;
            margin-top: 10px;
            border-radius: 12px;
            display: none;
        }
        
        .hidden-admin-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            opacity: 0;
            cursor: pointer;
            z-index: 999;
            background: transparent;
            border: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            max-width: 420px;
            width: 90%;
            padding: 2rem;
            border-radius: 48px;
        }
        
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
        }
        
        .image-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }
        
        .image-preview-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }
        
        .admin-badge {
            background: #c2410c;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        
        @media (max-width: 700px) {
            .header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📚 Variados aos Estudos</h1>
            <span>Questões personalizadas</span>
        </div>
        <div class="user-area" id="userArea">
            <span id="userEmailDisplay" class="badge-user">Não autenticado</span>
            <button id="loginSignupBtn" class="btn btn-primary">Entrar / Criar conta</button>
            <button id="logoutBtn" class="btn btn-outline" style="display: none;">Sair</button>
        </div>
    </div>
    
    <div class="questions-panel">
        <div class="section-title"><i class="fas fa-puzzle-piece"></i> Questões da Comunidade</div>
        <div id="questionsList">
            <div style="text-align:center; padding: 2rem;">Carregando questões...</div>
        </div>
    </div>
    
    <div id="adminPanel" class="admin-panel">
        <div class="section-title"><i class="fas fa-crown"></i> Painel Admin</div>
        <div>
            <div class="form-group">
                <label>📝 Pergunta</label>
                <input type="text" id="questionText" placeholder="Ex: Qual a capital do Brasil?">
            </div>
            <div class="form-group">
                <label>✅ Resposta correta</label>
                <input type="text" id="correctAnswer" placeholder="Resposta exata">
            </div>
            <div class="form-group">
                <label>🖼️ URL da Imagem (opcional)</label>
                <input type="text" id="imageUrl" placeholder="https://exemplo.com/imagem.jpg">
                <div id="imagePreview" class="image-preview"></div>
            </div>
            <div class="admin-actions">
                <button id="createQuestionBtn" class="btn btn-primary">➕ Criar Questão</button>
                <button id="refreshQuestionsBtn" class="btn btn-outline">🔄 Atualizar</button>
            </div>
            <hr style="margin: 1.5rem 0;">
            <div id="adminQuestionsList">
                <p style="color: #666;">📋 Lista de questões para gerenciar</p>
            </div>
        </div>
    </div>
    <footer>✨ Clique no canto inferior direito (área invisível) se for admin</footer>
</div>

<button id="secretAdminTrigger" class="hidden-admin-btn" title="Área restrita"></button>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeAuthModal" style="float: right; font-size: 1.7rem; cursor: pointer;">&times;</span>
        <div class="modal-header" style="font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem;">Acessar Variados</div>
        <form id="authForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="authEmail" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="authPassword" required placeholder="******">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" id="submitAuthBtn" class="btn btn-primary" style="flex:1">Entrar</button>
                <button type="button" id="switchToSignupBtn" class="btn btn-outline" style="flex:1">Criar conta</button>
            </div>
        </form>
        <p id="authErrorMsg" style="color:#b91c1c; margin-top: 1rem; font-size:0.85rem;"></p>
    </div>
</div>

<div id="imagePreviewModal" class="image-preview-modal">
    <img id="modalImage" src="">
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // ============================================
    // CONFIGURAÇÃO DO FIREBASE
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyDHPuBTZ7A4GuHfEu-K2oFSka70Gnvy-Ks",
        authDomain: "ensinamentos-b16c1.firebaseapp.com",
        projectId: "ensinamentos-b16c1",
        storageBucket: "ensinamentos-b16c1.firebasestorage.app",
        messagingSenderId: "713593965269",
        appId: "1:713593965269:web:d4338ff0e6753e9fe6b05c",
        databaseURL: "https://ensinamentos-b16c1-default-rtdb.firebaseio.com"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    
    // ============================================
    // FUNÇÃO QUE CONSULTA O REALTIME DATABASE
    // CAMINHO: admin-users (direto, como na imagem)
    // ============================================
    async function verificarSeEAdmin(email) {
        if (!email) return false;
        
        try {
            console.log("🔍 Verificando se é admin:", email);
            
            const dbRef = ref(rtdb);
            // Caminho direto: admin-users (igual na sua imagem)
            const snapshot = await get(child(dbRef, 'admin-users'));
            
            console.log("📁 Caminho /admin-users existe?", snapshot.exists());
            
            if (snapshot.exists()) {
                const listaAdmins = snapshot.val();
                console.log("📋 Conteúdo do banco:", listaAdmins);
                
                // Percorrer todos os admins (admin1, admin2, admin3...)
                for (let adminId in listaAdmins) {
                    const admin = listaAdmins[adminId];
                    if (admin && admin.email === email) {
                        console.log(`✅ ${email} É ADMIN! Encontrado em: ${adminId}`);
                        return true;
                    }
                }
                console.log(`❌ ${email} NÃO está na lista de admins`);
                return false;
            } else {
                console.log("⚠️ Nenhum admin encontrado. Verifique se a estrutura está em /admin-users/");
                return false;
            }
        } catch (error) {
            console.error("Erro ao consultar Realtime Database:", error);
            return false;
        }
    }
    
    // ============================================
    // FUNÇÕES DO SITE
    // ============================================
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#1e4668';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }
    
    async function loadPublicQuestions() {
        try {
            const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const questions = [];
            snapshot.forEach(docSnap => {
                questions.push({ id: docSnap.id, ...docSnap.data() });
            });
            
            if (questions.length === 0) {
                questionsListDiv.innerHTML = '<div style="padding: 2rem; text-align:center;">✨ Nenhuma questão criada ainda. Faça login como admin para criar!</div>';
                return;
            }
            
            let html = '';
            questions.forEach(q => {
                const imageHtml = q.imageUrl ? `<div onclick="window.showImageModal('${escapeHtml(q.imageUrl)}')"><img src="${escapeHtml(q.imageUrl)}" class="question-image" onerror="this.style.display='none'"></div>` : '';
                html += `
                    <div class="question-card">
                        ${imageHtml}
                        <div class="question-text">❓ ${escapeHtml(q.questionText)}</div>
                        <div class="answer-area">
                            <input type="text" class="answer-input" id="ans-${q.id}" placeholder="Sua resposta...">
                            <button class="check-btn" data-id="${q.id}" data-answer="${escapeHtml(q.correctAnswer).replace(/"/g, '&quot;')}">Verificar</button>
                        </div>
                        <div class="feedback" id="fb-${q.id}"></div>
                    </div>
                `;
            });
            questionsListDiv.innerHTML = html;
            
            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const qid = btn.getAttribute('data-id');
                    const correctAns = btn.getAttribute('data-answer');
                    const inputElem = document.getElementById(`ans-${qid}`);
                    const userAnswer = inputElem?.value.trim() || '';
                    const fbDiv = document.getElementById(`fb-${qid}`);
                    if (userAnswer.toLowerCase() === correctAns.toLowerCase()) {
                        fbDiv.innerHTML = '<span style="color:#15803d;">✅ Correta! Parabéns.</span>';
                    } else {
                        fbDiv.innerHTML = `<span style="color:#b91c1c;">❌ Incorreta. Resposta correta: ${escapeHtml(correctAns)}</span>`;
                    }
                });
            });
        } catch (err) {
            console.error(err);
            questionsListDiv.innerHTML = '<div>❌ Erro ao carregar questões. Verifique o Firestore.</div>';
        }
    }
    
    window.showImageModal = (url) => {
        const modal = document.getElementById('imagePreviewModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = url;
    };
    
    document.getElementById('imagePreviewModal')?.addEventListener('click', () => {
        document.getElementById('imagePreviewModal').style.display = 'none';
    });
    
    async function loadAdminQuestions() {
        if (!isAdmin) return;
        try {
            const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                document.getElementById('adminQuestionsList').innerHTML = '<p>📭 Nenhuma questão. Crie a primeira!</p>';
                return;
            }
            let html = '<div style="display:flex; flex-direction:column; gap:12px;">';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                html += `
                    <div style="background:#f1f5f9; border-radius:20px; padding:1rem;">
                        <strong>📌 ${escapeHtml(data.questionText)}</strong><br>
                        <span>✅ Resposta: ${escapeHtml(data.correctAnswer)}</span><br>
                        ${data.imageUrl ? `<span>🖼️ <a href="${escapeHtml(data.imageUrl)}" target="_blank">Ver imagem</a></span><br>` : ''}
                        <div style="margin-top:8px;">
                            <button class="edit-question-btn" data-id="${docSnap.id}" data-question="${escapeHtml(data.questionText)}" data-answer="${escapeHtml(data.correctAnswer)}" data-image="${escapeHtml(data.imageUrl || '')}">✏️ Editar</button>
                            <button class="delete-question-btn" data-id="${docSnap.id}" style="background:#c2410c; color:white; border:none; border-radius:40px; padding:0.3rem 0.9rem; margin-left:8px;">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('adminQuestionsList').innerHTML = html;
            
            document.querySelectorAll('.delete-question-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('Tem certeza que deseja excluir esta questão?')) {
                        await deleteDoc(doc(db, "questions", id));
                        showToast('🗑️ Questão removida!');
                        loadPublicQuestions();
                        loadAdminQuestions();
                    }
                });
            });
            
            document.querySelectorAll('.edit-question-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const oldQuestion = btn.getAttribute('data-question');
                    const oldAnswer = btn.getAttribute('data-answer');
                    const oldImage = btn.getAttribute('data-image');
                    const newQuestion = prompt("Editar pergunta:", oldQuestion);
                    if (newQuestion && newQuestion.trim()) {
                        const newAnswer = prompt("Editar resposta:", oldAnswer);
                        if (newAnswer && newAnswer.trim()) {
                            const newImage = prompt("URL da imagem (deixe em branco para remover):", oldImage || '');
                            const updateData = {
                                questionText: newQuestion.trim(),
                                correctAnswer: newAnswer.trim()
                            };
                            if (newImage !== null && newImage.trim() !== '') {
                                updateData.imageUrl = newImage.trim();
                            } else if (newImage === '') {
                                updateData.imageUrl = null;
                            }
                            await updateDoc(doc(db, "questions", id), updateData);
                            showToast('✏️ Questão atualizada!');
                            loadPublicQuestions();
                            loadAdminQuestions();
                        }
                    }
                });
            });
        } catch (err) { 
            console.error(err); 
        }
    }
    
    async function createNewQuestion() {
        if (!isAdmin) { showToast('❌ Acesso negado. Faça login como admin.', true); return; }
        const text = document.getElementById('questionText').value.trim();
        const answer = document.getElementById('correctAnswer').value.trim();
        const imageUrl = document.getElementById('imageUrl').value.trim();
        if (!text || !answer) { showToast('❌ Preencha pergunta e resposta', true); return; }
        
        try {
            const newId = Date.now().toString();
            const questionData = {
                questionText: text,
                correctAnswer: answer,
                createdAt: new Date().toISOString()
            };
            if (imageUrl && imageUrl !== '') questionData.imageUrl = imageUrl;
            
            await setDoc(doc(db, "questions", newId), questionData);
            showToast('✅ Questão criada com sucesso!');
            document.getElementById('questionText').value = '';
            document.getElementById('correctAnswer').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            loadPublicQuestions();
            if (isAdmin) loadAdminQuestions();
        } catch (err) { 
            showToast('❌ Erro: ' + err.message, true); 
        }
    }
    
    // Preview da imagem
    document.getElementById('imageUrl')?.addEventListener('input', (e) => {
        const url = e.target.value;
        const preview = document.getElementById('imagePreview');
        if (url && (url.startsWith('http') || url.startsWith('data:image'))) {
            preview.style.display = 'block';
            preview.innerHTML = `<img src="${url}" style="max-width: 200px; max-height: 150px; border-radius: 12px;" onerror="this.style.display='none'">`;
        } else {
            preview.style.display = 'none';
            preview.innerHTML = '';
        }
    });
    
    // ============================================
    // GERENCIAMENTO DE USUÁRIO E ADMIN
    // ============================================
    let currentUser = null;
    let isAdmin = false;
    
    const questionsListDiv = document.getElementById('questionsList');
    const adminPanel = document.getElementById('adminPanel');
    const userEmailSpan = document.getElementById('userEmailDisplay');
    const loginSignupBtn = document.getElementById('loginSignupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const secretTrigger = document.getElementById('secretAdminTrigger');
    const createQuestionBtn = document.getElementById('createQuestionBtn');
    const refreshBtn = document.getElementById('refreshQuestionsBtn');
    
    // Função principal: quando o usuário faz login
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            userEmailSpan.innerHTML = user.email;
            loginSignupBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            
            // Verificar se é admin no Realtime Database
            isAdmin = await verificarSeEAdmin(user.email);
            
            if (isAdmin) {
                adminPanel.classList.add('visible');
                loadAdminQuestions();
                showToast('👑 Modo admin ativado!');
                console.log("🎉 Usuário é ADMIN! Painel liberado.");
            } else {
                adminPanel.classList.remove('visible');
                showToast('👤 Modo usuário comum');
                console.log("👤 Usuário comum, sem painel admin.");
            }
        } else {
            currentUser = null;
            isAdmin = false;
            userEmailSpan.innerHTML = 'Não autenticado';
            loginSignupBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            adminPanel.classList.remove('visible');
        }
        loadPublicQuestions();
    });
    
    // Modal de login
    const authModal = document.getElementById('authModal');
    const closeModal = document.getElementById('closeAuthModal');
    const authFormModal = document.getElementById('authForm');
    const submitAuthBtn = document.getElementById('submitAuthBtn');
    const switchBtn = document.getElementById('switchToSignupBtn');
    const modalTitle = document.getElementById('modalTitle');
    const authErrorMsg = document.getElementById('authErrorMsg');
    let currentMode = 'login';
    
    loginSignupBtn.onclick = () => { authModal.style.display = 'flex'; };
    logoutBtn.onclick = async () => { await signOut(auth); showToast('🔓 Desconectado'); };
    closeModal.onclick = () => { authModal.style.display = 'none'; };
    window.onclick = (e) => { if (e.target === authModal) authModal.style.display = 'none'; };
    
    switchBtn.onclick = () => {
        currentMode = currentMode === 'login' ? 'signup' : 'login';
        modalTitle.innerText = currentMode === 'login' ? 'Entrar no Variados' : 'Criar conta';
        submitAuthBtn.innerText = currentMode === 'login' ? 'Entrar' : 'Cadastrar';
    };
    
    authFormModal.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        try {
            if (currentMode === 'login') {
                await signInWithEmailAndPassword(auth, email, password);
                showToast(`🎉 Bem-vindo, ${email}!`);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
                showToast(`✅ Conta criada! Agora faça login.`);
            }
            authModal.style.display = 'none';
            authErrorMsg.innerText = '';
        } catch (err) {
            authErrorMsg.innerText = err.message;
        }
    };
    
    // Botão invisível para admin (canto inferior direito)
    secretTrigger.addEventListener('click', () => {
        if (!currentUser) {
            showToast('🔐 Faça login primeiro', true);
            authModal.style.display = 'flex';
        } else if (!isAdmin) {
            showToast('⛔ Acesso apenas para administradores', true);
        } else {
            adminPanel.classList.toggle('visible');
            if (adminPanel.classList.contains('visible')) {
                loadAdminQuestions();
                showToast('📂 Painel admin aberto');
            } else {
                showToast('📂 Painel admin fechado');
            }
        }
    });
    
    createQuestionBtn?.addEventListener('click', createNewQuestion);
    refreshBtn?.addEventListener('click', () => { loadPublicQuestions(); if(isAdmin) loadAdminQuestions(); });
    
    loadPublicQuestions();
    console.log("🔥 Site carregado! Verificando admins em: /admin-users/");
</script>
</body>
</html>
