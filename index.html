<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Variados aos Estudos | Sistema Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #1e293b;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .xp-bar {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .role-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        .role-aluno { background: #10b981; color: white; }
        .role-professor { background: #3b82f6; color: white; }
        .role-admin { background: #ef4444; color: white; }
        .role-diretor { background: #8b5cf6; color: white; }
        
        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
        .btn-success { background: #10b981; color: white; }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 0.8rem 1.5rem;
            text-align: center;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
            font-weight: 600;
            color: white;
        }
        
        .tab.active { background: white; color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .panel {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .task-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .task-time {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        
        .question-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .alternative {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            border-radius: 16px;
            background: white;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        
        .alternative.selected { background: #667eea20; border-color: #667eea; }
        .alternative-letter {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            border-radius: 50%;
            font-weight: 700;
        }
        
        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 16px;
        }
        
        .feedback.correct { background: #d1fae5; color: #059669; }
        .feedback.incorrect { background: #fee2e2; color: #dc2626; }
        
        .answer-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }
        
        .admin-panel { display: none; }
        .admin-panel.visible { display: block; }
        
        .hidden-admin-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            opacity: 0;
            cursor: pointer;
            z-index: 999;
            background: transparent;
            border: none;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            border-radius: 32px;
        }
        
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: #1e293b;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
        }
        
        .form-group { margin-bottom: 1.5rem; }
        label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
        }
        
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-wrapper input {
            flex: 1;
            padding-right: 40px;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .tabs { flex-direction: column; border-radius: 20px; }
            .tasks-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📚 Variados aos Estudos</h1>
            <span>Sistema de Aprendizagem</span>
        </div>
        <div class="user-info" id="userInfo">
            <div class="xp-bar" id="xpBar" style="display: none;">
                <i class="fas fa-star"></i>
                <span id="xpPoints">0 XP</span>
            </div>
            <span id="roleBadge" class="role-badge"></span>
            <span id="userEmailDisplay" class="badge-user">Não autenticado</span>
            <button id="profileBtn" class="btn btn-outline" style="display: none;"><i class="fas fa-user"></i></button>
            <button id="loginBtn" class="btn btn-primary">Entrar</button>
            <button id="logoutBtn" class="btn btn-outline" style="display: none;">Sair</button>
        </div>
    </div>
    
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="questions">📝 Questões</div>
        <div class="tab" data-tab="tasks">📋 Tarefas</div>
        <div class="tab" data-tab="completed">✅ Concluídas</div>
        <div class="tab" data-tab="ranking">🏆 Ranking</div>
    </div>
    
    <div id="tab-questions" class="tab-content"><div class="panel"><div class="section-title">Banco de Questões</div><div id="questionsList"></div></div></div>
    <div id="tab-tasks" class="tab-content"><div class="panel"><div class="section-title">Tarefas Pendentes</div><div id="pendingTasksList" class="tasks-grid"></div></div></div>
    <div id="tab-completed" class="tab-content"><div class="panel"><div class="section-title">Tarefas Concluídas</div><div id="completedTasksList" class="tasks-grid"></div></div></div>
    <div id="tab-ranking" class="tab-content"><div class="panel"><div class="section-title">Ranking</div><div id="rankingList"></div></div></div>
    
    <div id="adminPanel" class="admin-panel panel">
        <div class="section-title"><i class="fas fa-crown"></i> Painel Admin</div>
        <div class="form-group"><label>Tipo</label><select id="questionType"><option value="multiple">Múltipla Escolha</option><option value="written">Resposta Escrita</option></select></div>
        <div class="form-group"><label>Pergunta</label><input type="text" id="questionText" placeholder="Digite a pergunta"></div>
        <div class="form-group"><label>Imagem URL</label><input type="text" id="imageUrl" placeholder="https://..."></div>
        <div id="alternativesContainer" style="display:none">
            <div class="alternative-input"><span>A)</span><input type="text" id="altA" placeholder="Alternativa A"></div>
            <div class="alternative-input"><span>B)</span><input type="text" id="altB" placeholder="Alternativa B"></div>
            <div class="alternative-input"><span>C)</span><input type="text" id="altC" placeholder="Alternativa C"></div>
            <div class="alternative-input"><span>D)</span><input type="text" id="altD" placeholder="Alternativa D"></div>
            <select id="correctAlternative"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
        </div>
        <div id="writtenContainer"><div class="form-group"><label>Resposta Correta</label><input type="text" id="correctAnswer"></div></div>
        <div class="form-group"><label>Categoria</label><select id="taskCategory"><option>Matemática</option><option>Português</option><option>Ciências</option><option>História</option><option>Geografia</option></select></div>
        <button id="createQuestionBtn" class="btn btn-primary">➕ Criar Questão</button>
        <hr style="margin:1rem 0">
        <div class="form-group"><label>Título da Tarefa</label><input type="text" id="taskTitle"></div>
        <div class="form-group"><label>Descrição</label><textarea id="taskDesc" rows="2"></textarea></div>
        <div class="form-group"><label>Enviar para</label><select id="targetUsers" multiple style="height:100px"></select></div>
        <div class="form-group"><label>Qtd Questões</label><input type="number" id="questionsCount" value="3"></div>
        <button id="createTaskBtn" class="btn btn-primary">📤 Criar Tarefa</button>
        <hr style="margin:1rem 0">
        <div class="form-group"><label>Gerenciar Usuários</label><div id="usersManageList"></div></div>
    </div>
</div>

<button id="secretAdminTrigger" class="hidden-admin-btn"></button>

<div id="profileModal" class="modal"><div class="modal-content"><h2>Meu Perfil</h2><div id="profileContent"></div><button id="saveProfileBtn" class="btn btn-primary" style="width:100%">Salvar</button><button id="closeProfileModal" style="margin-top:1rem; width:100%" class="btn btn-outline">Fechar</button></div></div>
<div id="taskModal" class="modal"><div class="modal-content"><h2 id="modalTaskTitle"></h2><div id="modalTaskQuestions"></div><button id="submitTaskBtn" class="btn btn-success" style="width:100%; margin-top:1rem">✅ Entregar Tarefa</button><button id="closeTaskModal2" class="btn btn-outline" style="width:100%; margin-top:0.5rem">Fechar</button></div></div>
<div id="authModal" class="modal"><div class="modal-content"><span id="closeAuthModal" style="float:right; font-size:1.7rem; cursor:pointer">&times;</span><h2 id="authTitle">Entrar</h2><form id="authForm"><div class="form-group"><label>Email</label><input type="email" id="authEmail" required></div><div class="form-group"><label>Senha</label><div class="password-wrapper"><input type="password" id="authPassword" required><i class="fas fa-eye toggle-password" onclick="togglePassword()"></i></div></div><button type="submit" class="btn btn-primary" style="width:100%">Entrar</button><button type="button" id="switchAuthBtn" class="btn btn-outline" style="width:100%; margin-top:10px">Criar Conta</button></form><p id="authErrorMsg" style="color:red; margin-top:10px"></p></div></div>
<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, orderBy, addDoc, where, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDHPuBTZ7A4GuHfEu-K2oFSka70Gnvy-Ks",
        authDomain: "ensinamentos-b16c1.firebaseapp.com",
        projectId: "ensinamentos-b16c1",
        storageBucket: "ensinamentos-b16c1.firebasestorage.app",
        messagingSenderId: "713593965269",
        appId: "1:713593965269:web:d4338ff0e6753e9fe6b05c",
        databaseURL: "https://ensinamentos-b16c1-default-rtdb.firebaseio.com"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    
    let currentUser = null;
    let currentUserRole = 'aluno';
    let currentUserXP = 0;
    let allQuestions = [];
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#667eea';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&' ? '&amp;' : m==='<' ? '&lt;' : '&gt;'); }
    
    function formatTimeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return `há ${seconds} segundos`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `há ${minutes} minutos`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `há ${hours} horas`;
        const days = Math.floor(hours / 24);
        return `há ${days} dias`;
    }
    
    function getRoleBadgeClass(role) {
        const roles = { 'aluno': 'role-aluno', 'professor': 'role-professor', 'admin': 'role-admin', 'diretor': 'role-diretor' };
        return roles[role] || 'role-aluno';
    }
    
    function getRoleName(role) {
        const names = { 'aluno': '👨‍🎓 Aluno', 'professor': '👨‍🏫 Professor', 'admin': '👑 Admin', 'diretor': '⭐ Diretor' };
        return names[role] || 'Aluno';
    }
    
    window.togglePassword = () => {
        const passwordInput = document.getElementById('authPassword');
        const icon = document.querySelector('.toggle-password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    };
    
    async function loadUserProfile(email) {
        const userRef = doc(db, "users", email);
        let userDoc = await getDoc(userRef);
        if (!userDoc.exists()) {
            await setDoc(userRef, { email, role: 'aluno', xp: 0, level: 1, name: email.split('@')[0], createdAt: new Date().toISOString() });
            userDoc = await getDoc(userRef);
        }
        const data = userDoc.data();
        currentUserRole = data.role || 'aluno';
        currentUserXP = data.xp || 0;
        return data;
    }
    
    async function updateUserRole(email, newRole) {
        await updateDoc(doc(db, "users", email), { role: newRole });
        if (currentUser && currentUser.email === email) currentUserRole = newRole;
        showToast(`Usuário atualizado para ${getRoleName(newRole)}`);
    }
    
    async function addXP(amount) {
        if (!currentUser) return;
        const userRef = doc(db, "users", currentUser.email);
        const userDoc = await getDoc(userRef);
        const currentXP = (userDoc.data()?.xp || 0) + amount;
        const newLevel = Math.floor(currentXP / 100) + 1;
        await updateDoc(userRef, { xp: increment(amount), level: newLevel });
        currentUserXP = currentXP;
        document.getElementById('xpPoints').innerHTML = `${currentXP} XP`;
        showToast(`+${amount} XP! 🎉`);
    }
    
    async function loadAllQuestions() {
        const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        allQuestions = [];
        snapshot.forEach(docSnap => allQuestions.push({ id: docSnap.id, ...docSnap.data() }));
        renderQuestionsList();
    }
    
    function renderQuestionsList() {
        const container = document.getElementById('questionsList');
        if (!container) return;
        if (allQuestions.length === 0) { container.innerHTML = '<div style="text-align:center; padding:2rem">📭 Nenhuma questão</div>'; return; }
        
        container.innerHTML = allQuestions.map(q => `
            <div class="question-item">
                <div style="font-weight:700; margin-bottom:0.5rem">❓ ${escapeHtml(q.questionText)}</div>
                ${q.imageUrl ? `<img src="${escapeHtml(q.imageUrl)}" style="max-width:100%; max-height:150px; border-radius:12px; margin-bottom:0.5rem">` : ''}
                ${q.type === 'multiple' ? `
                    <div id="alts-${q.id}">
                        ${['A','B','C','D'].map(l => q.alternatives?.[l] ? `<div class="alternative" onclick="selectAlt('${q.id}','${l}')"><div class="alternative-letter">${l}</div><div>${escapeHtml(q.alternatives[l])}</div></div>` : '').join('')}
                    </div>
                    <button class="btn btn-primary" onclick="checkMultiple('${q.id}','${q.correctAnswer}')">Verificar</button>
                ` : `
                    <input type="text" id="ans-${q.id}" class="answer-input" placeholder="Digite sua resposta">
                    <button class="btn btn-primary" onclick="checkWritten('${q.id}','${escapeHtml(q.correctAnswer).replace(/'/g, "\\'")}')" style="margin-top:0.5rem">Verificar</button>
                `}
                <div id="fb-${q.id}" class="feedback"></div>
            </div>
        `).join('');
    }
    
    window.selectAlt = (id, letter) => {
        const container = document.getElementById(`alts-${id}`);
        if (!container) return;
        container.querySelectorAll('.alternative').forEach(a => a.classList.remove('selected'));
        const selected = Array.from(container.querySelectorAll('.alternative')).find(a => a.querySelector('.alternative-letter')?.innerText === letter);
        if (selected) selected.classList.add('selected');
        window.selectedAnswers = { ...window.selectedAnswers, [id]: letter };
    };
    
    window.checkMultiple = async (id, correct) => {
        const selected = window.selectedAnswers?.[id];
        const fb = document.getElementById(`fb-${id}`);
        if (!selected) { fb.innerHTML = '❌ Selecione uma alternativa'; fb.className = 'feedback incorrect'; return; }
        if (selected === correct) { fb.innerHTML = '✅ Correta! +10 XP'; fb.className = 'feedback correct'; await addXP(10); }
        else { fb.innerHTML = `❌ Incorreta! Resposta: ${correct}`; fb.className = 'feedback incorrect'; }
    };
    
    window.checkWritten = async (id, correct) => {
        const input = document.getElementById(`ans-${id}`);
        const answer = input?.value.trim().toLowerCase() || '';
        const fb = document.getElementById(`fb-${id}`);
        if (answer === correct.toLowerCase()) { fb.innerHTML = '✅ Correta! +10 XP'; fb.className = 'feedback correct'; await addXP(10); }
        else { fb.innerHTML = `❌ Incorreta! Resposta: ${escapeHtml(correct)}`; fb.className = 'feedback incorrect'; }
    };
    
    async function loadUserTasks() {
        if (!currentUser) return;
        const tasksRef = collection(db, "tasks");
        const q = query(tasksRef, where("targetUsers", "array-contains", currentUser.email));
        const snapshot = await getDocs(q);
        const tasks = [];
        snapshot.forEach(docSnap => tasks.push({ id: docSnap.id, ...docSnap.data() }));
        
        const pending = tasks.filter(t => !t.completedBy?.includes(currentUser.email));
        const completed = tasks.filter(t => t.completedBy?.includes(currentUser.email));
        
        document.getElementById('pendingTasksList').innerHTML = pending.map(t => `
            <div class="task-card" onclick="openTask('${t.id}','${escapeHtml(t.title)}',${JSON.stringify(t.questions).replace(/"/g, '&quot;')}, '${t.createdAt}')">
                <div class="task-title">${escapeHtml(t.title)}</div>
                <div class="task-meta">${t.category} • ${t.questions?.length || 0} questões</div>
                <div class="task-time"><i class="far fa-clock"></i> ${formatTimeAgo(t.createdAt)}</div>
                <span class="task-status status-pending">⏳ Pendente</span>
            </div>
        `).join('');
        
        document.getElementById('completedTasksList').innerHTML = completed.map(t => `
            <div class="task-card">
                <div class="task-title">${escapeHtml(t.title)}</div>
                <div class="task-meta">${t.category} • ${t.questions?.length || 0} questões</div>
                <div class="task-time"><i class="fas fa-check-circle"></i> Concluída ${formatTimeAgo(t.completedAt || t.createdAt)}</div>
                <span class="task-status status-completed">✅ Concluída</span>
            </div>
        `).join('');
    }
    
    window.openTask = (id, title, questions, createdAt) => {
        document.getElementById('modalTaskTitle').innerHTML = `${title} <span style="font-size:0.8rem; color:#64748b;">(${formatTimeAgo(createdAt)})</span>`;
        document.getElementById('modalTaskQuestions').innerHTML = questions.map((q, idx) => `
            <div style="margin-bottom:1rem; padding:1rem; background:#f8fafc; border-radius:16px">
                <div><strong>${idx+1}. ${escapeHtml(q.questionText)}</strong></div>
                ${q.imageUrl ? `<img src="${escapeHtml(q.imageUrl)}" style="max-width:100%; max-height:100px; border-radius:8px">` : ''}
                ${q.type === 'multiple' ? `
                    <div id="task-alt-${idx}">
                        ${['A','B','C','D'].map(l => q.alternatives?.[l] ? `<div class="alternative" onclick="selectTaskAlt(${idx},'${l}')"><div class="alternative-letter">${l}</div><div>${escapeHtml(q.alternatives[l])}</div></div>` : '').join('')}
                    </div>
                ` : `<input type="text" id="task-ans-${idx}" class="answer-input" placeholder="Digite sua resposta">`}
                <div id="task-fb-${idx}" class="feedback"></div>
            </div>
        `).join('');
        window.currentTaskId = id;
        window.currentTaskQuestions = questions;
        document.getElementById('taskModal').style.display = 'flex';
    };
    
    window.selectTaskAlt = (idx, letter) => {
        const container = document.getElementById(`task-alt-${idx}`);
        if (!container) return;
        container.querySelectorAll('.alternative').forEach(a => a.classList.remove('selected'));
        const selected = Array.from(container.querySelectorAll('.alternative')).find(a => a.querySelector('.alternative-letter')?.innerText === letter);
        if (selected) selected.classList.add('selected');
        window.taskAnswers = { ...window.taskAnswers, [idx]: letter };
    };
    
    document.getElementById('submitTaskBtn')?.addEventListener('click', async () => {
        let allCorrect = true;
        let correctCount = 0;
        for (let i = 0; i < window.currentTaskQuestions.length; i++) {
            const q = window.currentTaskQuestions[i];
            let isCorrect = false;
            if (q.type === 'multiple') {
                const answer = window.taskAnswers?.[i];
                isCorrect = answer === q.correctAnswer;
            } else {
                const input = document.getElementById(`task-ans-${i}`);
                isCorrect = input?.value.trim().toLowerCase() === q.correctAnswer.toLowerCase();
            }
            if (isCorrect) correctCount++;
            else allCorrect = false;
            const fb = document.getElementById(`task-fb-${i}`);
            if (fb) { fb.innerHTML = isCorrect ? '✅ Correta!' : `❌ Incorreta! Resposta: ${escapeHtml(q.correctAnswer)}`; fb.className = isCorrect ? 'feedback correct' : 'feedback incorrect'; }
        }
        if (allCorrect) {
            await updateDoc(doc(db, "tasks", window.currentTaskId), { 
                completedBy: arrayUnion(currentUser.email),
                completedAt: new Date().toISOString()
            });
            await addXP(window.currentTaskQuestions.length * 15);
            showToast(`🎉 Tarefa concluída! +${window.currentTaskQuestions.length * 15} XP`);
            document.getElementById('taskModal').style.display = 'none';
            loadUserTasks();
            loadRanking();
            window.taskAnswers = {};
        } else {
            showToast(`❌ Acertou ${correctCount}/${window.currentTaskQuestions.length}. Precisa acertar todas!`, true);
        }
    });
    
    async function loadRanking() {
        const snapshot = await getDocs(collection(db, "users"));
        const users = [];
        snapshot.forEach(docSnap => users.push({ email: docSnap.id, ...docSnap.data() }));
        users.sort((a, b) => (b.xp || 0) - (a.xp || 0));
        document.getElementById('rankingList').innerHTML = users.map((u, idx) => `
            <div style="display:flex; align-items:center; gap:1rem; padding:0.8rem; background:#f8fafc; border-radius:16px; margin-bottom:0.5rem">
                <div style="width:50px; font-size:1.5rem">${idx === 0 ? '🏆' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}º`}</div>
                <div style="flex:1"><strong>${escapeHtml(u.email)}</strong><br><small>${getRoleName(u.role)}</small></div>
                <div>⭐ ${u.xp || 0} XP</div>
                <div>Nv${u.level || 1}</div>
            </div>
        `).join('');
    }
    
    async function createQuestion() {
        const type = document.getElementById('questionType').value;
        const text = document.getElementById('questionText').value.trim();
        if (!text) { showToast('Digite a pergunta!', true); return; }
        const data = { questionText: text, type, createdAt: new Date().toISOString(), category: document.getElementById('taskCategory').value, imageUrl: document.getElementById('imageUrl').value };
        if (type === 'multiple') {
            data.alternatives = { A: document.getElementById('altA').value, B: document.getElementById('altB').value, C: document.getElementById('altC').value, D: document.getElementById('altD').value };
            data.correctAnswer = document.getElementById('correctAlternative').value;
        } else {
            data.correctAnswer = document.getElementById('correctAnswer').value;
        }
        await addDoc(collection(db, "questions"), data);
        showToast('✅ Questão criada!');
        loadAllQuestions();
    }
    
    async function createTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) { showToast('Digite um título!', true); return; }
        const selectedQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, parseInt(document.getElementById('questionsCount').value));
        if (selectedQuestions.length === 0) { showToast('Crie questões primeiro!', true); return; }
        const targetSelect = document.getElementById('targetUsers');
        let targetUsers = Array.from(targetSelect.selectedOptions).map(opt => opt.value);
        if (targetUsers.includes('todos')) {
            const usersSnapshot = await getDocs(collection(db, "users"));
            targetUsers = [];
            usersSnapshot.forEach(docSnap => targetUsers.push(docSnap.id));
        }
        await addDoc(collection(db, "tasks"), {
            title, description: document.getElementById('taskDesc').value, category: document.getElementById('taskCategory').value,
            questions: selectedQuestions.map(q => ({ questionText: q.questionText, type: q.type, alternatives: q.alternatives, correctAnswer: q.correctAnswer, imageUrl: q.imageUrl })),
            targetUsers, createdBy: currentUser.email, createdAt: new Date().toISOString(), completedBy: []
        });
        showToast('✅ Tarefa criada!');
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
    }
    
    async function loadUsersList() {
        const snapshot = await getDocs(collection(db, "users"));
        const targetSelect = document.getElementById('targetUsers');
        const manageDiv = document.getElementById('usersManageList');
        targetSelect.innerHTML = '<option value="todos">📢 Todos os usuários</option>';
        manageDiv.innerHTML = '';
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            targetSelect.innerHTML += `<option value="${docSnap.id}">${docSnap.id}</option>`;
            manageDiv.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:0.5rem; border-bottom:1px solid #e2e8f0">
                <div><strong>${escapeHtml(docSnap.id)}</strong><br><small>${getRoleName(data.role)}</small></div>
                <select id="role-${docSnap.id}" onchange="updateRole('${docSnap.id}', this.value)" style="width:auto">
                    <option value="aluno" ${data.role === 'aluno' ? 'selected' : ''}>Aluno</option>
                    <option value="professor" ${data.role === 'professor' ? 'selected' : ''}>Professor</option>
                    <option value="admin" ${data.role === 'admin' ? 'selected' : ''}>Admin</option>
                    <option value="diretor" ${data.role === 'diretor' ? 'selected' : ''}>Diretor</option>
                </select>
            </div>`;
        });
    }
    
    window.updateRole = async (email, newRole) => { await updateUserRole(email, newRole); loadUsersList(); };
    
    async function openProfile() {
        const userData = await loadUserProfile(currentUser.email);
        document.getElementById('profileContent').innerHTML = `
            <div class="form-group"><label>Nome</label><input type="text" id="profileName" value="${escapeHtml(userData.name || '')}"></div>
            <div class="form-group"><label>Email</label><input type="text" value="${currentUser.email}" disabled></div>
            <div class="form-group"><label>Cargo</label><input type="text" value="${getRoleName(userData.role)}" disabled></div>
            <div class="form-group"><label>XP Total</label><input type="text" value="${userData.xp || 0} XP" disabled></div>
            <div class="form-group"><label>Nível</label><input type="text" value="${userData.level || 1}" disabled></div>
        `;
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
        const name = document.getElementById('profileName')?.value;
        if (name) await updateDoc(doc(db, "users", currentUser.email), { name });
        showToast('Perfil atualizado!');
        document.getElementById('profileModal').style.display = 'none';
    });
    
    document.getElementById('questionType')?.addEventListener('change', (e) => {
        const isMultiple = e.target.value === 'multiple';
        document.getElementById('alternativesContainer').style.display = isMultiple ? 'block' : 'none';
        document.getElementById('writtenContainer').style.display = isMultiple ? 'none' : 'block';
    });
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const profile = await loadUserProfile(user.email);
            document.getElementById('userEmailDisplay').innerHTML = user.email;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('profileBtn').style.display = 'inline-block';
            document.getElementById('xpBar').style.display = 'flex';
            document.getElementById('xpPoints').innerHTML = `${currentUserXP} XP`;
            document.getElementById('roleBadge').innerHTML = getRoleName(currentUserRole);
            document.getElementById('roleBadge').className = `role-badge ${getRoleBadgeClass(currentUserRole)}`;
            
            const canAccessAdmin = currentUserRole === 'admin' || currentUserRole === 'diretor' || currentUserRole === 'professor';
            if (canAccessAdmin) document.getElementById('adminPanel').classList.add('visible');
            else document.getElementById('adminPanel').classList.remove('visible');
            
            await loadAllQuestions();
            loadUserTasks();
            loadRanking();
            if (canAccessAdmin) loadUsersList();
        } else {
            currentUser = null;
            document.getElementById('userEmailDisplay').innerHTML = 'Não autenticado';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('profileBtn').style.display = 'none';
            document.getElementById('xpBar').style.display = 'none';
            document.getElementById('roleBadge').innerHTML = '';
            document.getElementById('adminPanel').classList.remove('visible');
            loadAllQuestions();
        }
    });
    
    const authModal = document.getElementById('authModal');
    document.getElementById('loginBtn').onclick = () => authModal.style.display = 'flex';
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); showToast('Deslogado'); };
    document.getElementById('profileBtn').onclick = openProfile;
    document.getElementById('closeAuthModal').onclick = () => authModal.style.display = 'none';
    document.getElementById('closeProfileModal').onclick = () => document.getElementById('profileModal').style.display = 'none';
    document.getElementById('closeTaskModal2').onclick = () => document.getElementById('taskModal').style.display = 'none';
    window.onclick = (e) => { if (e.target === authModal) authModal.style.display = 'none'; };
    
    let isLogin = true;
    document.getElementById('switchAuthBtn').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('switchAuthBtn').innerText = isLogin ? 'Criar Conta' : 'Voltar para Login';
        document.getElementById('authTitle').innerText = isLogin ? 'Entrar' : 'Criar Conta';
    };
    
    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
                showToast(`Bem-vindo!`);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", email), { email, role: 'aluno', xp: 0, level: 1, name: email.split('@')[0], createdAt: new Date().toISOString() });
                showToast(`Conta criada! Faça login.`);
            }
            authModal.style.display = 'none';
            document.getElementById('authErrorMsg').innerText = '';
        } catch (err) { document.getElementById('authErrorMsg').innerText = err.message; }
    };
    
    document.getElementById('secretAdminTrigger').onclick = () => {
        if (!currentUser) { showToast('Faça login primeiro', true); authModal.style.display = 'flex'; }
        else if (currentUserRole !== 'admin' && currentUserRole !== 'diretor') { showToast('Acesso restrito', true); }
        else { document.getElementById('adminPanel').classList.toggle('visible'); }
    };
    
    document.getElementById('createQuestionBtn')?.addEventListener('click', createQuestion);
    document.getElementById('createTaskBtn')?.addEventListener('click', createTask);
    document.getElementById('questionType')?.dispatchEvent(new Event('change'));
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab-${tab.getAttribute('data-tab')}`).classList.add('active');
            if (tab.getAttribute('data-tab') === 'ranking') loadRanking();
            if (tab.getAttribute('data-tab') === 'tasks') loadUserTasks();
        });
    });
    
    console.log('🔥 Site pronto! Faça login para começar.');
</script>
</body>
</html>
