<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variados aos Estudos | FORÇADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eefa 100%);
            min-height: 100vh;
            color: #1e2a3e;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b3b4e, #1a4d8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary { background: #2c5f8a; color: white; }
        .btn-primary:hover { background: #1e4668; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #2c5f8a; color: #2c5f8a; }
        .badge-user { background: #e2e8f0; padding: 0.4rem 1rem; border-radius: 40px; font-size: 0.85rem; }
        
        .questions-panel {
            background: white;
            border-radius: 32px;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-left: 5px solid #2c5f8a;
            padding-left: 1rem;
        }
        
        .question-card {
            background: #f9fafc;
            border-radius: 24px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #e2edf7;
        }
        
        .question-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin: 10px 0;
            cursor: pointer;
        }
        
        .question-text { font-weight: 600; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .answer-area { margin-top: 0.8rem; display: flex; gap: 0.7rem; flex-wrap: wrap; }
        .answer-input { flex: 1; padding: 0.6rem 1rem; border-radius: 60px; border: 1px solid #cbd5e1; }
        .check-btn { background: #2c5f8a; color: white; border: none; border-radius: 40px; padding: 0.5rem 1rem; cursor: pointer; }
        .feedback { margin-top: 0.4rem; font-size: 0.85rem; font-weight: 500; }
        
        .admin-panel {
            display: none;
            background: #ffffffdd;
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(44,95,138,0.3);
        }
        
        .admin-panel.visible { display: block; }
        
        .form-group { margin-bottom: 1.2rem; }
        label { font-weight: 600; display: block; margin-bottom: 0.4rem; }
        input, textarea { width: 100%; padding: 0.8rem; border-radius: 20px; border: 1px solid #cbd5e1; font-family: inherit; }
        
        .hidden-admin-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            opacity: 0.3;
            cursor: pointer;
            z-index: 999;
            background: #c2410c;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
        }
        
        .hidden-admin-btn:hover { opacity: 0.8; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            max-width: 420px;
            width: 90%;
            padding: 2rem;
            border-radius: 48px;
        }
        
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
        }
        
        .debug-panel {
            background: #1e1e2e;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-panel.visible { display: block; }
        
        @media (max-width: 700px) {
            .header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📚 Variados aos Estudos</h1>
            <span>Modo FORÇADO</span>
        </div>
        <div class="user-area" id="userArea">
            <span id="userEmailDisplay" class="badge-user">Não autenticado</span>
            <button id="loginSignupBtn" class="btn btn-primary">Entrar</button>
            <button id="logoutBtn" class="btn btn-outline" style="display: none;">Sair</button>
        </div>
    </div>
    
    <div class="questions-panel">
        <div class="section-title"><i class="fas fa-puzzle-piece"></i> Questões</div>
        <div id="questionsList">
            <div style="text-align:center; padding: 2rem;">Carregando...</div>
        </div>
    </div>
    
    <div id="adminPanel" class="admin-panel">
        <div class="section-title"><i class="fas fa-crown"></i> Painel Admin</div>
        <div>
            <div class="form-group">
                <label>📝 Pergunta</label>
                <input type="text" id="questionText" placeholder="Digite a pergunta">
            </div>
            <div class="form-group">
                <label>✅ Resposta correta</label>
                <input type="text" id="correctAnswer" placeholder="Resposta exata">
            </div>
            <div class="form-group">
                <label>🖼️ URL da Imagem</label>
                <input type="text" id="imageUrl" placeholder="https://...">
            </div>
            <button id="createQuestionBtn" class="btn btn-primary">➕ Criar Questão</button>
            <button id="refreshBtn" class="btn btn-outline">🔄 Atualizar</button>
            <hr style="margin: 1rem 0;">
            <div id="adminQuestionsList"></div>
        </div>
    </div>
    
    <div class="debug-panel" id="debugPanel">
        <strong>📡 LOGS DO SISTEMA:</strong><br>
        <div id="debugLogs"></div>
    </div>
    
    <footer>✨ Botão laranja no canto direito = Admin</footer>
</div>

<button id="secretAdminTrigger" class="hidden-admin-btn" title="Admin">👑</button>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span id="closeAuthModal" style="float: right; font-size: 1.7rem; cursor: pointer;">&times;</span>
        <div class="modal-header" style="font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem;">Acessar</div>
        <form id="authForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="authEmail" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="authPassword" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
            <button type="button" id="switchToSignupBtn" class="btn btn-outline" style="width:100%; margin-top:10px;">Criar Conta</button>
        </form>
        <p id="authErrorMsg" style="color:red; margin-top:10px;"></p>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // Configuração
    const firebaseConfig = {
        apiKey: "AIzaSyDHPuBTZ7A4GuHfEu-K2oFSka70Gnvy-Ks",
        authDomain: "ensinamentos-b16c1.firebaseapp.com",
        projectId: "ensinamentos-b16c1",
        storageBucket: "ensinamentos-b16c1.firebasestorage.app",
        messagingSenderId: "713593965269",
        appId: "1:713593965269:web:d4338ff0e6753e9fe6b05c",
        databaseURL: "https://ensinamentos-b16c1-default-rtdb.firebaseio.com"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    
    // Debug
    function addLog(msg) {
        const logsDiv = document.getElementById('debugLogs');
        const time = new Date().toLocaleTimeString();
        logsDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
        logsDiv.scrollTop = logsDiv.scrollHeight;
        console.log(msg);
        document.getElementById('debugPanel').classList.add('visible');
    }
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#1e4668';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }
    
    // ============================================
    // VERIFICAÇÃO FORÇADA - TESTA TODOS OS CAMINHOS
    // ============================================
    async function verificarSeEAdmin(email) {
        if (!email) {
            addLog("❌ Email vazio, não é admin");
            return false;
        }
        
        addLog(`🔍 Verificando se ${email} é admin...`);
        
        try {
            const dbRef = ref(rtdb);
            
            // TESTAR VÁRIOS CAMINHOS POSSÍVEIS
            const caminhos = [
                'admin-users',
                'admin/admin-users', 
                'admins',
                'administradores',
                'admin/admins'
            ];
            
            for (const caminho of caminhos) {
                addLog(`📁 Testando caminho: /${caminho}/`);
                const snapshot = await get(child(dbRef, caminho));
                
                if (snapshot.exists()) {
                    addLog(`✅ Caminho /${caminho}/ EXISTE!`);
                    const dados = snapshot.val();
                    addLog(`📋 Conteúdo: ${JSON.stringify(dados)}`);
                    
                    // Percorrer os dados
                    for (let chave in dados) {
                        const item = dados[chave];
                        addLog(`🔎 Comparando: ${item?.email} com ${email}`);
                        if (item && item.email === email) {
                            addLog(`🎉 ${email} É ADMIN! Encontrado em /${caminho}/${chave}`);
                            return true;
                        }
                    }
                } else {
                    addLog(`❌ Caminho /${caminho}/ NÃO existe`);
                }
            }
            
            addLog(`❌ ${email} NÃO é admin - não encontrado em nenhum caminho`);
            return false;
            
        } catch (error) {
            addLog(`💥 ERRO: ${error.message}`);
            return false;
        }
    }
    
    // ============================================
    // FUNÇÕES DAS QUESTÕES
    // ============================================
    async function loadPublicQuestions() {
        try {
            const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            const questions = [];
            snapshot.forEach(docSnap => {
                questions.push({ id: docSnap.id, ...docSnap.data() });
            });
            
            if (questions.length === 0) {
                document.getElementById('questionsList').innerHTML = '<div style="padding: 2rem; text-align:center;">Nenhuma questão. Faça login como admin para criar!</div>';
                return;
            }
            
            let html = '';
            questions.forEach(q => {
                const imageHtml = q.imageUrl ? `<img src="${escapeHtml(q.imageUrl)}" class="question-image" onerror="this.style.display='none'" onclick="window.showImageModal('${escapeHtml(q.imageUrl)}')">` : '';
                html += `
                    <div class="question-card">
                        ${imageHtml}
                        <div class="question-text">❓ ${escapeHtml(q.questionText)}</div>
                        <div class="answer-area">
                            <input type="text" class="answer-input" id="ans-${q.id}" placeholder="Sua resposta...">
                            <button class="check-btn" data-id="${q.id}" data-answer="${escapeHtml(q.correctAnswer).replace(/"/g, '&quot;')}">Verificar</button>
                        </div>
                        <div class="feedback" id="fb-${q.id}"></div>
                    </div>
                `;
            });
            document.getElementById('questionsList').innerHTML = html;
            
            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const qid = btn.getAttribute('data-id');
                    const correctAns = btn.getAttribute('data-answer');
                    const inputElem = document.getElementById(`ans-${qid}`);
                    const userAnswer = inputElem?.value.trim() || '';
                    const fbDiv = document.getElementById(`fb-${qid}`);
                    if (userAnswer.toLowerCase() === correctAns.toLowerCase()) {
                        fbDiv.innerHTML = '<span style="color:#15803d;">✅ Correta!</span>';
                    } else {
                        fbDiv.innerHTML = `<span style="color:#b91c1c;">❌ Resposta: ${escapeHtml(correctAns)}</span>`;
                    }
                });
            });
        } catch (err) {
            addLog(`❌ Erro ao carregar questões: ${err.message}`);
        }
    }
    
    window.showImageModal = (url) => {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.background = 'rgba(0,0,0,0.9)';
        modal.style.display = 'flex';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
        modal.style.zIndex = '9999';
        modal.style.cursor = 'pointer';
        modal.innerHTML = `<img src="${url}" style="max-width: 90%; max-height: 90%; border-radius: 16px;">`;
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    };
    
    async function loadAdminQuestions() {
        if (!window.isAdminAtual) return;
        try {
            const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                document.getElementById('adminQuestionsList').innerHTML = '<p>Nenhuma questão</p>';
                return;
            }
            let html = '';
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                html += `
                    <div style="background:#f1f5f9; border-radius:20px; padding:1rem; margin-bottom:10px;">
                        <strong>${escapeHtml(data.questionText)}</strong><br>
                        <span>✅ ${escapeHtml(data.correctAnswer)}</span><br>
                        <button class="delete-q" data-id="${docSnap.id}" style="background:#c2410c; color:white; border:none; border-radius:40px; padding:0.3rem 0.9rem; margin-top:8px;">🗑️ Excluir</button>
                    </div>
                `;
            });
            document.getElementById('adminQuestionsList').innerHTML = html;
            
            document.querySelectorAll('.delete-q').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('Excluir?')) {
                        await deleteDoc(doc(db, "questions", id));
                        showToast('Removido!');
                        loadPublicQuestions();
                        loadAdminQuestions();
                    }
                });
            });
        } catch (err) {
            addLog(`Erro admin: ${err.message}`);
        }
    }
    
    async function createNewQuestion() {
        if (!window.isAdminAtual) {
            showToast('Acesso negado', true);
            return;
        }
        const text = document.getElementById('questionText').value.trim();
        const answer = document.getElementById('correctAnswer').value.trim();
        const imageUrl = document.getElementById('imageUrl').value.trim();
        if (!text || !answer) {
            showToast('Preencha pergunta e resposta', true);
            return;
        }
        
        try {
            const newId = Date.now().toString();
            const data = {
                questionText: text,
                correctAnswer: answer,
                createdAt: new Date().toISOString()
            };
            if (imageUrl) data.imageUrl = imageUrl;
            await setDoc(doc(db, "questions", newId), data);
            showToast('Criada!');
            document.getElementById('questionText').value = '';
            document.getElementById('correctAnswer').value = '';
            document.getElementById('imageUrl').value = '';
            loadPublicQuestions();
            if (window.isAdminAtual) loadAdminQuestions();
        } catch (err) {
            showToast('Erro: ' + err.message, true);
        }
    }
    
    // ============================================
    // MAIN
    // ============================================
    let currentUser = null;
    window.isAdminAtual = false;
    
    const adminPanel = document.getElementById('adminPanel');
    const userEmailSpan = document.getElementById('userEmailDisplay');
    const loginBtn = document.getElementById('loginSignupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const secretBtn = document.getElementById('secretAdminTrigger');
    const createBtn = document.getElementById('createQuestionBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    
    addLog("🚀 SITE INICIADO - Modo FORÇADO");
    addLog(`📡 Firebase Realtime Database URL: ${firebaseConfig.databaseURL}`);
    
    onAuthStateChanged(auth, async (user) => {
        addLog(`🔄 Auth state changed: ${user ? user.email : 'null'}`);
        
        if (user) {
            currentUser = user;
            userEmailSpan.innerHTML = `${user.email} <span id="adminBadge"></span>`;
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            
            // VERIFICAR SE É ADMIN
            const ehAdmin = await verificarSeEAdmin(user.email);
            window.isAdminAtual = ehAdmin;
            
            if (ehAdmin) {
                adminPanel.classList.add('visible');
                document.getElementById('adminBadge').innerHTML = ' <span style="background:#c2410c; color:white; padding:2px 8px; border-radius:20px; font-size:11px;">ADMIN</span>';
                loadAdminQuestions();
                addLog(`👑 PAINEL ADMIN ATIVADO para ${user.email}`);
                showToast('👑 Modo Admin ATIVADO!');
            } else {
                adminPanel.classList.remove('visible');
                document.getElementById('adminBadge').innerHTML = '';
                addLog(`👤 Usuário comum: ${user.email}`);
                showToast('👤 Modo usuário comum');
            }
        } else {
            currentUser = null;
            window.isAdminAtual = false;
            userEmailSpan.innerHTML = 'Não autenticado';
            loginBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            adminPanel.classList.remove('visible');
            addLog("👋 Nenhum usuário logado");
        }
        loadPublicQuestions();
    });
    
    // MODAL LOGIN
    const modal = document.getElementById('authModal');
    const closeModal = document.getElementById('closeAuthModal');
    const authForm = document.getElementById('authForm');
    const switchBtn = document.getElementById('switchToSignupBtn');
    let isLogin = true;
    
    loginBtn.onclick = () => modal.style.display = 'flex';
    logoutBtn.onclick = async () => { await signOut(auth); showToast('Deslogado'); };
    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    switchBtn.onclick = () => {
        isLogin = !isLogin;
        switchBtn.innerText = isLogin ? 'Criar Conta' : 'Voltar para Login';
        document.querySelector('.modal-header').innerText = isLogin ? 'Entrar' : 'Criar Conta';
    };
    
    authForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
                showToast(`Bem-vindo ${email}!`);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
                showToast(`Conta criada! Faça login.`);
            }
            modal.style.display = 'none';
            document.getElementById('authErrorMsg').innerText = '';
        } catch (err) {
            document.getElementById('authErrorMsg').innerText = err.message;
        }
    };
    
    secretBtn.onclick = () => {
        if (!currentUser) {
            showToast('Faça login primeiro', true);
            modal.style.display = 'flex';
        } else if (!window.isAdminAtual) {
            showToast('Você não é admin!', true);
            addLog(`⚠️ Tentativa de acesso admin negada para ${currentUser.email}`);
        } else {
            adminPanel.classList.toggle('visible');
            showToast(adminPanel.classList.contains('visible') ? 'Admin aberto' : 'Admin fechado');
        }
    };
    
    createBtn?.addEventListener('click', createNewQuestion);
    refreshBtn?.addEventListener('click', () => {
        loadPublicQuestions();
        if (window.isAdminAtual) loadAdminQuestions();
    });
    
    // Forçar teste manual no console
    window.testarAdmin = async (email) => {
        addLog(`🧪 TESTE MANUAL para ${email}`);
        return await verificarSeEAdmin(email);
    };
    
    addLog("✅ Site pronto! Use F12 para ver o console");
    addLog("💡 Comando manual: await testarAdmin('seu@email.com')");
</script>
</body>
</html>
